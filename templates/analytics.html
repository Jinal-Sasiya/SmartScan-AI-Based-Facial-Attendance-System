<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Analytics Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

<style>

body{

    background:
    linear-gradient(
        135deg,
        #0f172a,
        #111827,
        #1e293b
    );

    min-height: 100vh;

    color: white;

    font-family: Poppins;
}

.analytics-container{

    width: 90%;

    max-width: 1200px;

    margin: 50px auto;
}

.chart-box{

    background: rgba(255,255,255,0.05);

    padding: 30px;

    border-radius: 24px;

    backdrop-filter: blur(14px);

    box-shadow:
    0 8px 30px rgba(0,0,0,0.35);
}

.title{

    font-size: 42px;

    font-weight: 700;

    margin-bottom: 10px;
}

.subtitle{

    opacity: 0.7;

    margin-bottom: 40px;
}

</style>

</head>

<body>

<div class="analytics-container">

    <div class="d-flex
    justify-content-between
    align-items-center
    mb-5">

        <div>

            <h1 class="title">
                Attendance Analytics
            </h1>

            <p class="subtitle">
                AI-based attendance insights dashboard
            </p>

        </div>

        <a href="/"
        class="btn btn-light">

            Back Dashboard

        </a>

    </div>

    <div class="chart-box">

        <canvas id="attendanceChart"></canvas>

    </div>

</div>

<script>

const ctx =
document.getElementById('attendanceChart');

new Chart(ctx, {

    type: 'bar',

    data: {

        labels: {{ labels | tojson }},

        datasets: [{

            label: 'Attendance Count',

            data: {{ values | tojson }},

            borderWidth: 1
        }]
    },

    options: {

        responsive: true,

        plugins: {

            legend: {

                labels: {

                    color: 'white'
                }
            }
        },

        scales: {

            y: {

                ticks: {

                    color: 'white'
                }
            },

            x: {

                ticks: {

                    color: 'white'
                }
            }
        }
    }
});

</script>

</body>
</html>
