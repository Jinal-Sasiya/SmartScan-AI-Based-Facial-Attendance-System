```html
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Live AI Camera</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{

    background:
    linear-gradient(
        135deg,
        #0f172a,
        #111827,
        #1e293b
    );

    min-height: 100vh;

    color: white;

    font-family: Poppins;
}

.camera-container{

    width: 90%;

    max-width: 1100px;

    margin: 50px auto;

    background: rgba(255,255,255,0.05);

    border-radius: 30px;

    padding: 30px;

    backdrop-filter: blur(14px);

    box-shadow:
    0 8px 40px rgba(0,0,0,0.4);
}

.camera-title{

    font-size: 42px;

    font-weight: 700;

    margin-bottom: 10px;
}

.subtitle{

    opacity: 0.7;

    margin-bottom: 30px;
}

.camera-box{

    overflow: hidden;

    border-radius: 24px;

    border:
    2px solid rgba(255,255,255,0.08);

    box-shadow:
    0 8px 30px rgba(0,0,0,0.45);
}

.camera-box img{

    width: 100%;

    display: block;
}

.btn-custom{

    padding: 12px 24px;

    border-radius: 14px;

    border: none;

    font-weight: 500;
}

.status-box{

    background: rgba(255,255,255,0.05);

    border-radius: 18px;

    padding: 18px;

    margin-top: 25px;
}

.online-dot{

    width: 12px;

    height: 12px;

    background: #22c55e;

    border-radius: 50%;

    display: inline-block;

    margin-right: 8px;
}

</style>

</head>

<body>

<div class="camera-container">

    <div class="d-flex
    justify-content-between
    align-items-center
    flex-wrap
    gap-3">

        <div>

            <h1 class="camera-title">
                AI Live Recognition
            </h1>

            <p class="subtitle">
                Real-time facial attendance monitoring
            </p>

        </div>

        <a href="/"
        class="btn btn-light btn-custom">

            <i class="bi bi-arrow-left"></i>
            Back Dashboard

        </a>

    </div>

    <!-- CAMERA -->

    <div class="camera-box">

        <img src="{{ url_for('video_feed') }}">

    </div>

    <!-- STATUS -->

    <div class="status-box">

        <h5>

            <span class="online-dot"></span>

            AI Recognition Active

        </h5>

        <p class="mb-0 mt-2" style="opacity:0.7;">

            Face detection and attendance tracking
            running successfully.

        </p>

    </div>

</div>

</body>
</html>
