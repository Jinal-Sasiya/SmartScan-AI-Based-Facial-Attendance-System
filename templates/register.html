<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Register Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

<style>

body{

    background:
    linear-gradient(
        135deg,
        #0f172a,
        #111827,
        #1e293b
    );

    min-height: 100vh;

    display: flex;

    justify-content: center;

    align-items: center;

    color: white;

    font-family: Poppins;
}

.register-box{

    width: 450px;

    background: rgba(255,255,255,0.05);

    padding: 40px;

    border-radius: 24px;

    backdrop-filter: blur(14px);

    box-shadow:
    0 8px 30px rgba(0,0,0,0.4);
}

.form-control{

    background: rgba(255,255,255,0.08);

    border: none;

    color: white;

    padding: 14px;

    border-radius: 14px;
}

.form-control::placeholder{

    color: rgba(255,255,255,0.5);
}

.btn-custom{

    width: 100%;

    padding: 14px;

    border-radius: 14px;

    border: none;

    font-weight: 600;
}

</style>

</head>

<body>

<div class="register-box">

    <h1 class="mb-4">
        Register Student
    </h1>

    <form method="POST">

        <input type="text"
        name="name"
        class="form-control mb-4"
        placeholder="Enter student name"
        required>

        <button class="btn btn-primary btn-custom">

            Start Face Capture

        </button>

    </form>

</div>

</body>
</html>
